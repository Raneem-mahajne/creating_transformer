name: stat_shared_letters
complexity: shared_letters
words: ["cat", "hat", "map"]
delimiter: "|"
data:
  num_sequences: 2000
  min_length: 40
  max_length: 120
model:
  n_embd: 2
  block_size: 16
  num_heads: 1
  head_size: 2
training:
  max_steps: 10000
  batch_size: 8
  learning_rate: 0.001
  eval_interval: 200
  eval_iterations: 50
  checkpoint_interval: 100
